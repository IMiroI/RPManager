<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer un compte — RPManager</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      background:
        radial-gradient(ellipse 800px 420px at 50% -140px, rgba(143, 121, 224, 0.16), transparent 70%),
        radial-gradient(ellipse 540px 280px at 50% -60px, rgba(217, 180, 91, 0.07), transparent 70%),
        var(--bg);
    }
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 28px;
    }
    .auth-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }
    .auth-brand:hover { text-decoration: none; }
    .auth-brand .brand-mono {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      font-size: 1.5rem;
    }
    .auth-brand .brand-name { font-size: 1.35rem; }
    .auth-tagline {
      font-size: 0.82rem;
      color: var(--text-muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .auth-card {
      width: 100%;
      max-width: 390px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
    }
    .auth-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 24px;
      right: 24px;
      height: 2px;
      border-radius: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.7;
    }
    .auth-title {
      font-family: var(--font-display);
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      margin-bottom: 4px;
      text-align: center;
    }
    .auth-sub {
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 24px;
    }
    .auth-error {
      display: none;
      background: rgba(224,101,78,0.15);
      border: 1px solid var(--danger);
      color: #f0a08f;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }
    .auth-hint {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 6px;
    }
    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <main class="auth-wrap">
    <a href="/" class="auth-brand">
      <div class="brand-mono">R</div>
      <span class="brand-name">RPManager</span>
      <span class="auth-tagline">Votre première histoire commence ici</span>
    </a>

    <div class="auth-card">
      <div class="auth-title">Créer un compte</div>
      <div class="auth-sub">Pour enregistrer et retrouver vos roleplays</div>

      <div class="auth-error" id="auth-error"></div>

      <form id="register-form">
        <div class="form-group">
          <label class="form-label">Nom d'utilisateur</label>
          <input type="text" class="form-input" id="username" autocomplete="username" required autofocus>
          <div class="auth-hint">3 à 30 caractères : lettres, chiffres, - ou _</div>
        </div>
        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <input type="password" class="form-input" id="password" autocomplete="new-password" required minlength="8">
          <div class="auth-hint">8 caractères minimum</div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirmer le mot de passe</label>
          <input type="password" class="form-input" id="password2" autocomplete="new-password" required minlength="8">
        </div>
        <button type="submit" class="btn btn-gold" style="width:100%;justify-content:center;">Créer mon compte</button>
      </form>

      <div class="auth-footer">
        Déjà un compte ? <a href="/login" id="login-link">Se connecter</a>
      </div>
    </div>

    <div class="auth-footer">
      En créant un compte, vous acceptez notre
      <a href="/legal#confidentialite">politique de confidentialité</a>.
    </div>
  </main>

  <script>
    const nextParam = new URLSearchParams(window.location.search).get('next');
    if (nextParam) {
      document.getElementById('login-link').href = `/login?next=${encodeURIComponent(nextParam)}`;
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      const errorBox = document.getElementById('auth-error');
      errorBox.style.display = 'none';

      if (password !== password2) {
        errorBox.textContent = 'Les mots de passe ne correspondent pas.';
        errorBox.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) {
          errorBox.textContent = data.error || 'Erreur lors de la création du compte';
          errorBox.style.display = 'block';
          return;
        }
        const next = new URLSearchParams(window.location.search).get('next');
        window.location.href = next || '/';
      } catch {
        errorBox.textContent = 'Impossible de contacter le serveur.';
        errorBox.style.display = 'block';
      }
    });
  </script>
</body>
</html>
