name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/imiroi/rolemaster

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/vgames-suite
            docker compose -f docker-compose.prod.yml pull rolemaster
            docker compose -f docker-compose.prod.yml up -d rolemaster

  notify-discord:
    needs: deploy
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
          COMPARE_URL: ${{ github.event.compare }}
          ACTOR: ${{ github.actor }}
        run: |
          DESCRIPTION=$(echo "$COMMITS_JSON" | jq -r '
            [.[] | "• " + (.message | split("\n")[0]) + "  — [`" + .id[0:7] + "`](" + .url + ") par *" + .author.name + "*"]
            | join("\n")
          ')

          # Discord limite la description d'un embed à 4096 caractères
          DESCRIPTION=$(echo "$DESCRIPTION" | cut -c1-4000)

          PAYLOAD=$(jq -n \
            --arg title "🚀 RoleMaster mis à jour sur main" \
            --arg desc "$DESCRIPTION" \
            --arg url "$COMPARE_URL" \
            --arg footer "Déployé par $ACTOR" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                url: $url,
                color: 5793266,
                footer: { text: $footer }
              }]
            }')

          curl -sS -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
